apiVersion: v1
kind: Service
metadata:
  name: {{ include "multi-tenant-scim.fullname" . }}
  labels:
    {{- include "multi-tenant-scim.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: https
      port: {{ include "multi-tenant-scim.port" . }}
      targetPort: https
  selector:
    {{- include "multi-tenant-scim.selectorLabels" . | nindent 4 }}
